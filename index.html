<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#b83b32"><meta name="robots" content="noindex,nofollow"><title>中国語 期末対策ドリル</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="styles-extra.css"><link rel="stylesheet" href="styles-plan.css"></head><body><main class="shell">
<header><div class="brand"><div class="seal">期末</div><div><h1>中国語 期末対策ドリル</h1><small>第5〜11課・間隔反復・ピンイン入力</small></div></div><button class="ghost" id="settingsBtn">同期</button></header>
<section class="stats"><div><b id="dueCount">0</b><span>期限到来</span></div><div><b id="masteredCount">0</b><span>定着技能</span></div><div><b id="streakCount">0</b><span>3日計画</span></div></section><div class="progress"><i id="progressBar"></i></div><section class="plan-card"><b id="planTitle">3日マスタープラン</b><span id="planDetail"></span></section>
<section class="panel" id="home"><div class="filters"><label>出題モード<select id="mode"><option value="ja-hanzi">日本語 → 簡体字</option><option value="hanzi-pinyin">簡体字 → ピンイン</option><option value="hanzi-ja">簡体字 → 日本語</option><option value="audio-hanzi">音声 → 簡体字（リスニング）</option><option value="mixed">ミックス</option></select></label><label>問題数<select id="sessionSize"><option>10</option><option selected>20</option><option>30</option><option value="999">すべて</option></select></label></div><div class="chips" id="lessonChips"></div><label class="toggle"><input type="checkbox" id="shuffle" checked> 出題順をシャッフル</label><button class="primary" id="startBtn">今日の学習を始める</button><button class="ghost wide" id="wordListBtn">単語一覧・習熟度を確認</button><p class="note">復習期限の来たカードを優先します。ピンインは <code>ni3</code> と入力すると <code>nǐ</code> に自動変換されます。</p></section>
<section class="panel study" id="study"><div class="meta"><span id="qMeta"></span><span id="qProgress"></span></div><div class="prompt" id="prompt"></div><form id="answerForm"><input id="answerInput" autocomplete="off" autocapitalize="none" spellcheck="false"><p class="note" id="hint"></p><button class="primary">答え合わせ</button></form><div class="result" id="result"><p id="judge"></p><div class="answers"><div><small>簡体字</small><b id="aHanzi"></b></div><div class="answer-box"><small>ピンイン</small><b id="aPinyin"></b></div><div><small>日本語</small><b id="aJa"></b></div><div><small>あなたの答え</small><b id="aYours"></b></div></div><div class="grades"><button data-grade="again"><kbd>1</kbd> もう一度<small>1分</small></button><button data-grade="hard"><kbd>2</kbd> 難しい<small>10分</small></button><button data-grade="good"><kbd>3</kbd> できた<small>次回</small></button><button data-grade="easy"><kbd>4</kbd> 簡単<small>間隔×1.8</small></button></div></div></section></main>
<dialog id="settings"><div class="modal"><h2>かんたん端末共有</h2><p class="note">最初の端末でTokenを入力して「今すぐ保存」後、「共有リンクをコピー」。別端末ではそのリンクを一度開くだけです。以後は起動時と学習後に自動同期します。</p><label>GitHub token<input id="token" type="password" placeholder="github_pat_..."></label><label>Gist ID（初回は空欄）<input id="gistId"></label><div id="syncStatus">未同期</div><button class="primary" id="shareBtn">共有リンクをコピー</button><div class="row"><button class="ghost" id="pullBtn">今すぐ取得</button><button class="ghost" id="pushBtn">今すぐ保存</button></div><div class="row"><button class="ghost" id="exportBtn">JSON書き出し</button><label class="ghost file">JSON読込<input type="file" id="importInput" accept="application/json" hidden></label></div><div class="row end"><button class="ghost" id="closeSettings">閉じる</button><button class="primary fit" id="saveSettings">設定を保存</button></div></div></dialog>
<dialog id="wordList"><div class="modal word-modal"><div class="list-head"><div><h2>単語一覧・習熟度</h2><p class="note" id="wordSummary"></p></div><button class="ghost" id="closeWordList">閉じる</button></div><div class="filters"><label>検索<input id="wordSearch" placeholder="簡体字・ピンイン・日本語"></label><label>課<select id="wordLesson"><option value="">すべて</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></label></div><div class="table-wrap"><table><thead><tr><th>課</th><th>単語</th><th>ピンイン・意味</th><th>習熟度</th><th>次回</th></tr></thead><tbody id="wordRows"></tbody></table></div></div></dialog>
<script src="data.js"></script><script src="app.js"></script><script>if('serviceWorker'in navigator){let refreshing=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!refreshing){refreshing=true;location.reload()}});navigator.serviceWorker.register('./sw.js').then(reg=>reg.update())}</script></body></html>
