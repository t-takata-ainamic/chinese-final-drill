<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#b83b32"><meta name="robots" content="noindex,nofollow"><title>中国語 期末対策ドリル</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"></head><body><main class="shell">
<header><div class="brand"><div class="seal">期末</div><div><h1>中国語 期末対策ドリル</h1><small>第5〜11課・間隔反復・ピンイン入力</small></div></div><button class="ghost" id="settingsBtn">同期</button></header>
<section class="stats"><div><b id="dueCount">0</b><span>今日の復習</span></div><div><b id="learnedCount">0</b><span>学習済み</span></div><div><b id="streakCount">0</b><span>連続学習日</span></div></section><div class="progress"><i id="progressBar"></i></div>
<section class="panel" id="home"><div class="filters"><label>出題モード<select id="mode"><option value="ja-hanzi">日本語 → 簡体字</option><option value="hanzi-pinyin">簡体字 → ピンイン</option><option value="hanzi-ja">簡体字 → 日本語</option><option value="mixed">ミックス</option></select></label><label>問題数<select id="sessionSize"><option>10</option><option selected>20</option><option>30</option><option value="999">すべて</option></select></label></div><div class="chips" id="lessonChips"></div><button class="primary" id="startBtn">今日の学習を始める</button><p class="note">復習期限の来たカードを優先します。声調は <code>ni3 hao3</code> の数字入力にも対応。</p></section>
<section class="panel study" id="study"><div class="meta"><span id="qMeta"></span><span id="qProgress"></span></div><div class="prompt" id="prompt"></div><form id="answerForm"><input id="answerInput" autocomplete="off" autocapitalize="none" spellcheck="false"><p class="note" id="hint"></p><button class="primary">答え合わせ</button></form><div class="result" id="result"><p id="judge"></p><div class="answers"><div><small>簡体字</small><b id="aHanzi"></b></div><div><small>ピンイン</small><b id="aPinyin"></b></div><div><small>日本語</small><b id="aJa"></b></div><div><small>あなたの答え</small><b id="aYours"></b></div></div><div class="grades"><button data-grade="again">もう一度<small>1分</small></button><button data-grade="hard">難しい<small>10分</small></button><button data-grade="good">できた<small>次回</small></button><button data-grade="easy">簡単<small>間隔×1.8</small></button></div></div></section></main>
<dialog id="settings"><div class="modal"><h2>同期とバックアップ</h2><p class="note">Private Gistを使うとPCとスマホで履歴を共有できます。Tokenはこの端末内だけに保存します。</p><label>GitHub token<input id="token" type="password" placeholder="github_pat_..."></label><label>Gist ID（初回は空欄）<input id="gistId"></label><div id="syncStatus">未同期</div><div class="row"><button class="ghost" id="pullBtn">クラウドから取得</button><button class="ghost" id="pushBtn">クラウドへ保存</button></div><div class="row"><button class="ghost" id="exportBtn">JSON書き出し</button><label class="ghost file">JSON読込<input type="file" id="importInput" accept="application/json" hidden></label></div><div class="row end"><button class="ghost" id="closeSettings">閉じる</button><button class="primary fit" id="saveSettings">設定を保存</button></div></div></dialog>
<script src="data.js"></script><script src="app.js"></script><script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js')</script></body></html>
